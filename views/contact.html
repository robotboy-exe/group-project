<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome 6 (latest free version) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Contact Us | Maybach Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #0b2545, #1a3a4b, #2b5e6b);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1rem;
        }

        .contact-card {
            width: min(90%, 1000px);
            display: flex;
            flex-wrap: wrap;
            border-radius: 40px 40px 40px 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .contact-card > * {
            flex: 1 1 300px;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1.5rem;
        }

        .contact-info {
            background: rgba(10, 35, 55, 0.7);
            color: white;
            border-right: 1px solid rgba(255,255,255,0.15);
        }

        .contact-info h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .contact-info p {
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            line-height: 1.8;
            opacity: 0.95;
        }

        .contact-info i.fa-phone, 
        .contact-info i.fa-envelope, 
        .contact-info i.fa-location-dot {
            margin-right: 0.8rem;
            color: #80d0ff;
            width: 1.8rem;
            text-align: center;
        }

        .contact-info .detail-line {
            display: flex;
            align-items: center;
            margin: 0.8rem 0;
        }

        .social-section {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #0a2337;
            align-items: center;
            text-align: center;
        }

        .social-section h2 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            margin-bottom: 1rem;
            color: #0b3b4e;
        }

        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1d6f9c, #0b4b6b);
            color: white;
            font-size: 2.2rem;
            transition: all 0.25s ease;
            box-shadow: 0 12px 20px -10px #022b40, 0 0 0 2px rgba(255,255,240,0.3);
            text-decoration: none;
        }

        .social-links a:hover {
            transform: translateY(-8px) scale(1.08);
            background: linear-gradient(145deg, #2590c0, #135e83);
            box-shadow: 0 25px 30px -12px #001a2b;
        }

        /* small screens: stack with no border */
        @media (max-width: 700px) {
            .contact-info {
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.2);
                border-radius: 40px 40px 0 0;
            }
            .contact-card {
                border-radius: 40px;
            }
        }

        /* optional fine tuning */
        .contact-info .detail-line i {
            font-size: 1.6rem;
        }
    </style>
</head>
<body>
    <div class="contact-card">
        <!-- Left: contact details -->
        <div class="contact-info">
            <h1>CONTACT</h1>
            <div class="detail-line">
                <i class="fas fa-phone-alt"></i>
                <span>+234 802 416 4468</span>
            </div>
            <div class="detail-line">
                <i class="fas fa-envelope"></i>
                <span>info@maybachacademy.com</span>
            </div>
            <div class="detail-line">
                <i class="fas fa-map-marker-alt"></i>
                <span>No. 15 Ihama Road, Benin City, Edo State.</span>
            </div>
        </div>

        <!-- Right: social media -->
        <div class="social-section">
            <h2>CONNECT WITH US</h2>
            <div class="social-links">
                <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
                <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
            </div>
        </div>
    </div>
</body>
</html>

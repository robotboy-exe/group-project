<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment Details</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f4f6f9;
      color: #1e293b;
      line-height: 1.5;
    }

    .dashboard {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #0a1929 0%, #0f2a3f 100%);
      color: #e0e7ff;
      padding: 2rem 1.5rem;
      box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
    }

    .sidebar h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 2rem;
      color: white;
      letter-spacing: -0.02em;
      border-bottom: 2px solid #3b82f6;
      padding-bottom: 0.5rem;
    }

    .nav-links {
      list-style: none;
    }

    .nav-links li {
      margin: 0.5rem 0;
    }

    .nav-links a {
      display: block;
      padding: 0.75rem 1rem;
      color: #cbd5e1;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .nav-links a:hover {
      background-color: #1e3a5f;
      color: white;
      transform: translateX(4px);
    }

    /* Main content */
    .main-content {
      flex: 1;
      padding: 2rem 2.5rem;
      background-color: #f8fafc;
    }

    .main-content h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #0a1929, #1e4b6e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .main-content p {
      font-size: 1.1rem;
      color: #334155;
      margin-bottom: 2rem;
      padding: 1rem 1.5rem;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
      border-left: 4px solid #3b82f6;
    }

    /* Form */
    form {
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
      max-width: 600px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    input[type="file"] {
      display: block;
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #cbd5e1;
      border-radius: 0.5rem;
      font-family: inherit;
      margin-bottom: 1.5rem;
    }

    button {
      background: linear-gradient(to right, #1e3a5f, #1e4b6e);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: linear-gradient(to right, #0f2a3f, #163a4f);
      transform: scale(1.02);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .dashboard {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        padding: 1rem;
      }
      .main-content {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <aside class="sidebar">
    <h2>Student Portal</h2>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="assignments.html">Assignments</a></li>
      <li><a href="materials.html">Materials</a></li>
      <li><a href="grades.html">Grades</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="logout">Logout</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <h1>Web Development Project</h1>

    <p>
      Build a responsive dashboard using HTML, CSS, and JavaScript.
      Submit a ZIP file of your project.
    </p>

    <form>
      <label for="fileUpload">Upload File</label>
      <input type="file" id="fileUpload" />
      <button type="submit">Submit Assignment</button>
    </form>
  </main>
</div>
</body>
</html>
